<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Issue Detail - GRID R15</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="create-page">
      <section class="card create-card">
        <div class="section-head jira-head">
          <h2>Issue Detail</h2>
          <div class="detail-head-actions">
            <button id="editToggleBtn" class="entry-btn" type="button">Edit</button>
            <a class="entry-btn secondary" href="./index.html#issueList">Back to List</a>
          </div>
        </div>
        <form id="issueDetailForm" class="jira-form">
          <label class="jira-label">Summary (Title) *</label>
          <input class="jira-input" name="title" required />

          <div class="jira-grid">
            <div>
              <label class="jira-label">Component (Impact Level) *</label>
              <select class="jira-input" name="impactLevel" required>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
            </div>
            <div>
              <label class="jira-label">Issue Status *</label>
              <select class="jira-input status-pill-select" name="issueStatus" required>
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Closed">Closed</option>
                <option value="Resolved">Resolved</option>
              </select>
            </div>
            <div>
              <label class="jira-label">Platform *</label>
              <select class="jira-input" name="platform" required>
                <option value="Feature Phone">Feature Phone</option>
                <option value="Smart Phone">Smart Phone</option>
                <option value="Dispatcher">Dispatcher</option>
              </select>
            </div>
          </div>

          <label class="jira-label">Affected Version *</label>
          <input class="jira-input" name="occurrenceVersion" required />

          <label class="jira-label">Fixed Version</label>
          <input class="jira-input" name="modifiedVersion" />

          <label class="jira-label">Description *</label>
          <pre id="descriptionPreview" class="jira-preview"></pre>
          <textarea class="jira-input jira-textarea hidden" name="description" required></textarea>

          <label class="jira-label">Attachments</label>
          <input class="jira-input hidden" id="detailAttachmentInput" type="file" accept="image/*,video/*,.log,.txt,.json,.csv,text/plain" multiple />
          <div id="detailAttachmentHint" class="attachment-hint hidden"></div>
          <div id="attachmentPreviewList" class="attachment-preview-list"></div>

          <label class="jira-label">Comments</label>
          <div class="comment-input-row">
            <textarea id="commentInput" class="jira-input comment-input" placeholder="Write a comment"></textarea>
            <button id="commentAddBtn" class="entry-btn" type="button">Add Comment</button>
          </div>
          <div id="commentList" class="comment-list"></div>

          <div class="jira-actions">
            <a id="cancelBtn" class="entry-btn secondary" href="./index.html#issueList">Cancel</a>
            <button id="saveBtn" class="entry-btn hidden" type="submit">Save</button>
          </div>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./data-store.js"></script>
    <script src="./issue-detail.js"></script>
  </body>
</html>
